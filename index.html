<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estatísticas de Basquete</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Stats do Rachão do sábado guilherme cavalos maquina de resenha</h2>
        
        <select id="playerSelector" onchange="mostrarStats()">
            <option value="">Selecione o Jogador</option>
            <option value="bigode">Bigode</option>
            <option value="zoio">Zoio</option>]
            <option value="leo">leonardo castilhos girardi</option>
            <option value="maravilhado2.png ">Zé</option>
        </select>

        <div id="statsBox" class="stats-box">
            <div class="stat-line">Pontos: <span id="pts" class="value">0</span></div>
            <div class="stat-line">Assists: <span id="ast" class="value">0</span></div>
            <div class="stat-line">Rebotes: <span id="reb" class="value">0</span></div>
        </div>
    </div>

    <script>
        // Objeto com as estatísticas dos jogadores
        const jogadores = {
            bigode: { pts: 28.5, ast: 6.2, reb: 4.1 },
            zoio: { pts: 15.2, ast: 11.8, reb: 3.5 },
            ze: { pts: 10.1, ast: 2.5, reb: 14.7 },
            leo: { pts: 6463, ast: 2.5234, reb: 14.242347 }
        };

        function mostrarStats() {
            const selector = document.getElementById('playerSelector');
            const box = document.getElementById('statsBox');
            const player = selector.value;

            if (player) {
                // Preenche os dados
                document.getElementById('pts').innerText = jogadores[player].pts;
                document.getElementById('ast').innerText = jogadores[player].ast;
                document.getElementById('reb').innerText = jogadores[player].reb;
                
                // Mostra o painel
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }
    </script>
</body>
</html>
